<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .navbar {
            background-color: #171921;
            border-bottom: 1px solid #dee2e6;
            padding: 8px 0;
        }
        .navbar-brand {
            font-size: 16px;
            color: #ffffff;
            font-weight: 400;
        }
        .navbar-brand:hover {
            color: #ffffff;
        }
        .navbar-text {
            font-size: 14px;
            color: #ffffff;
        }
        .badge-role {
            font-weight: 400;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .badge-role-admin {
            font-weight: 400;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .btn-logout {
            font-size: 14px;
            color: #6c757d;
            background-color: transparent;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-logout:hover {
            color: #ffffff;
        }

        .page-title {
            font-size: 28px;
            font-weight: 500;
            color: #212529;
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #dee2e6;
            font-weight: 500;
            font-size: 16px;
        }
        .sidebar .list-group-item {
            border: none;
            border-radius: 0;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #212529;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar .list-group-item:hover {
            background-color: #f8f9fa;
        }
        .sidebar .list-group-item.active {
            background-color: #e7f1ff;
            color: #0d6efd;
            border-left: 3px solid #0d6efd;
        }
        /* CSS-табы */
        .tabs {
            display: flex;
            flex-wrap: wrap;
        }
        .tabs input[type="radio"] {
            display: none;
        }
        .tabs label {
            padding: 10px 20px;
            font-size: 16px;
            color: #6c757d;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tabs input[type="radio"]:checked + label {
            color: #212529;
            border-bottom: 2px solid #0d6efd;
        }
        .tab-content {
            display: none;
            width: 100%;
        }
        #tab1:checked ~ #content1,
        #tab2:checked ~ #content2 {
            display: block;
        }

        .card {
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }
        .card-header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            font-size: 16px;
            font-weight: 500;
            padding: 12px 16px;
        }

        .table {
            margin-bottom: 0;
        }
        .table thead th {
            background-color: #fff;
            font-weight: 500;
            font-size: 14px;
            padding: 10px 16px;
            border-bottom: 2px solid #dee2e6;
        }
        .table td {
            font-size: 14px;
            padding: 10px 16px;
            vertical-align: middle;
        }
        .table tr {
            border-bottom: 1px solid #dee2e6;
        }
        .table tr:last-child {
            border-bottom: none;
        }

        .btn-edit {
            font-size: 13px;
            background-color: #0073c3;
            color: #ffffff;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-edit:hover {
            background-color: #0d6efd;
            color: #fff;
        }
        .btn-delete {
            font-size: 13px;
            color: #ffffff;
            background-color: #dc3545;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-delete:hover {
            background-color: #ff5162;
            color: #fff;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .form-control {
            font-size: 14px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 8px 12px;
        }
        .btn-add {
            font-size: 14px;
            padding: 8px 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand" id="navbarEmail">admin@mail.ru</span>
        <span class="navbar-text">
            with roles:
            <span id="navbarRoles"></span>
        </span>
        <form th:action="@{/logout}" method="post" class="ms-auto">
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">


    <div id="alertContainer"></div>

    <div class="row">
        <!-- Левая боковая панель -->
        <div class="col-md-3 mb-4">
            <div class="sidebar">
                <div class="list-group list-group-flush">
                    <a href="/admin/users" class="list-group-item list-group-item-action active">
                        Admin
                    </a>
                    <a href="/user" class="list-group-item list-group-item-action">
                        User
                    </a>
                </div>
            </div>
        </div>

        <!-- Правая часть -->
        <div class="col-md-9">
            <h1>Admin panel</h1>
            <div class="tabs">
                <input type="radio" name="tabs" id="tab1" checked="checked">
                <label for="tab1">Users table</label>

                <input type="radio" name="tabs" id="tab2">
                <label for="tab2">New User</label>

                <!-- Таб 1: Таблица пользователей -->
                <div class="tab-content" id="content1">
                    <div class="card">
                        <div class="card-header">All users</div>
                        <div class="card-body p-0">
                            <table class="table">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Age</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Edit</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>
                                <tbody id="usersTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Таб 2: Новый пользователь -->
                <div class="tab-content" id="content2">
                    <div class="card">
                        <div class="card-header">Add new User</div>
                        <div class="card-body">
                            <form id="newUserForm">
                                <div class="col-md-6 mx-auto mb-3" style="text-align: center">
                                    <label class="form-label">First name</label>
                                    <input type="text" class="form-control" name="firstName" required placeholder="First name">
                                </div>
                                <div class="col-md-6 mx-auto mb-3" style="text-align: center">
                                    <label class="form-label">Last name</label>
                                    <input type="text" class="form-control" name="lastName" required placeholder="Last name">
                                </div>
                                <div class="col-md-6 mx-auto mb-3" style="text-align: center">
                                    <label class="form-label">Age</label>
                                    <input type="number" class="form-control" name="age" placeholder="Age">
                                </div>
                                <div class="col-md-6 mx-auto mb-3" style="text-align: center">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" name="email" required placeholder="Email">
                                </div>
                                <div class="col-md-6 mx-auto mb-3" style="text-align: center">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" name="password" required placeholder="Password">
                                </div>
                                <div class="col-md-6 mx-auto mb-3" style="text-align: center">
                                    <label class="form-label">Role</label>
                                    <select class="form-select" id="newUserRoles" multiple></select>
                                </div>
                                <div class="text-center">
                                    <button type="submit" class="btn btn-success btn-add">Add new user</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editUserId">
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">ID</label>
                    <input type="text" class="form-control" id="editId" disabled>
                </div>
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" id="editFirstName" required>
                </div>
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="editLastName" required>
                </div>
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">Age</label>
                    <input type="number" class="form-control" id="editAge">
                </div>
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="editEmail" required>
                </div>
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="editPassword" placeholder="Leave blank">
                </div>
                <div class="col-md-12 mx-auto mb-3" style="text-align: center">
                    <label class="form-label">Role</label>
                    <select class="form-select" id="editRoles" multiple></select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="saveEdit()">Edit</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete <strong id="deleteUserName"></strong>?</p>
                <input type="hidden" id="deleteUserId">
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">ID</label>
                    <input type="text" class="form-control" id="deleteId" disabled>
                </div>
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" id="deleteFirstName" disabled>
                </div>
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="deleteLastName" disabled>
                </div>
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">Age</label>
                    <input type="number" class="form-control" id="deleteAge" disabled>
                </div>
                <div class="mb-3 mx-auto" style="text-align: center">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="deleteEmail" disabled>
                </div>
                <div class="col-md-12 mx-auto mb-3" style="text-align: center">
                <label class="form-label">Role</label>
                <select class="form-select" id="deleteRoles" multiple disabled></select>
            </div>
                <div class="d-flex gap-2 justify-content-end">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
