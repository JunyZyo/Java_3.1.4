<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .navbar {
            background-color: #171921;
            border-bottom: 1px solid #dee2e6;
            padding: 8px 0;
        }
        .navbar-brand {
            font-size: 16px;
            color: #ffffff;
            font-weight: 400;
        }
        .navbar-brand:hover {
            color: #ffffff;
        }
        .navbar-text {
            font-size: 14px;
            color: #ffffff;
        }
        .badge-role {
            font-weight: 400;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .badge-role-admin {
            font-weight: 400;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .btn-logout {
            font-size: 14px;
            color: #6c757d;
            background-color: transparent;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-logout:hover {
            color: #ffffff;
        }
        .page-title {
            font-size: 28px;
            font-weight: 500;
        }
        .sidebar {
            background: white;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #dee2e6;
            font-weight: 500;
        }
        .sidebar .list-group-item {
            border: none;
            border-radius: 0;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #212529;
            text-decoration: none;
        }
        .sidebar .list-group-item:hover {
            background-color: #f8f9fa;
        }
        .sidebar .list-group-item.active {
            background-color: #e7f1ff;
            color: #0d6efd;
            border-left: 3px solid #0d6efd;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #0d6efd;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
        }
        .card {
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }
        .card-header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            font-weight: 500;
            padding: 12px 16px;
        }
        .info-table th {
            width: 160px;
            background: #fff;
            border-right: 1px solid #dee2e6;
        }
        .info-table td {
            background: #fff;
        }
        .nav-pills .nav-link {
            color: #6c757d;
            font-size: 14px;
            padding: 8px 16px;
        }
        .nav-pills .nav-link.active {
            background-color: #e7f1ff;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand" th:text="${viewedUser.email}">user@mail.ru</span>
        <span class="navbar-text">
            with roles:
            <span th:each="role : ${viewedUser.roles}"
                  th:class="${role.name == 'ADMIN'} ? 'badge-role-admin ms-1' : 'badge-role ms-1'"
                  th:text="${role.name}">USER</span>
        </span>
        <form th:action="@{/logout}" method="post" class="ms-auto">
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>
</nav>

<div class="container mt-4">

    <div class="row">
        <!-- Левая боковая панель -->
        <div class="col-md-3">
            <div class="sidebar">
                <div class="list-group list-group-flush">
                    <a th:each="user : ${users}"
                       th:href="@{/admin/users/{id}(id=${user.id})}"
                       class="list-group-item list-group-item-action"
                       th:classappend="${user.id == viewedUser.id} ? 'active'">
                        <div>
                            <div th:text="${user.firstName}">Admin Admin</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- Правая часть с информацией о пользователе -->
        <div class="col-md-9">
            <h1>User information-page</h1>
            <div class="card">
                <div class="card-header">About user</div>
                <div class="card-body">
                    <!-- Таблица с информацией -->
                    <table class="table info-table">
                        <thead>
                        <tr>
                            <th>ID</th>

                            <th>First Name</th>

                            <th>Last Name</th>

                            <th>Age</th>

                            <th>Email</th>

                            <th>Role</th>

                        </tr>
                        </thead>
                        <tbody>
                            <td th:text="${viewedUser.id}">2</td>
                            <td th:text="${viewedUser.firstName}">admin</td>
                            <td th:text="${viewedUser.lastName}">admin</td>
                            <td th:text="${viewedUser.age}">35</td>
                            <td th:text="${viewedUser.email}">admin@mail.ru</td>
                            <td>
                                <span th:each="role : ${viewedUser.roles}"
                                      th:class="${role.name == 'ADMIN'} ? 'badge-role-admin me-1' : 'badge-role me-1'"
                                      th:text="${role.name}">ADMIN</span>
                            </td>
                        </tbody>
                    </table>
                        <a href="/admin/users" class="btn btn-secondary btn-sm">Back to table</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно Edit -->
<div class="modal fade" th:id="'editModal' + ${viewedUser.id}" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/admin/users/{id}(id=${viewedUser.id})}" method="post">
                    <div class="mb-3">
                        <label class="form-label">ID</label>
                        <input type="text" class="form-control" th:value="${viewedUser.id}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" name="firstName" th:value="${viewedUser.firstName}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" name="lastName" th:value="${viewedUser.lastName}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" name="age" th:value="${viewedUser.age}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" th:value="${viewedUser.email}" required>
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Edit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
