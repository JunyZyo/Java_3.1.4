<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
<head>
    <title>Spring Security Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .card-header {
            background-color: #fff;
            border-bottom: 1px solid rgba(0,0,0,.125);
            font-weight: 500;
        }
        .table {
            margin-bottom: 0;
        }
        .table th {
            width: 200px;
            background-color: #f8f9fa;
            font-weight: 500;
            color: #495057;
        }
        .badge-role {
            font-weight: 400;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .navbar {
            background-color: #171921;
            border-bottom: 1px solid #dee2e6;
            padding: 8px 0;
        }
        .navbar-brand {
            font-size: 16px;
            color: #ffffff;
            font-weight: 400;
        }
        .navbar-brand:hover {
            color: #ffffff;
        }
        .navbar-text {
            font-size: 14px;
            color: #ffffff;
        }
        .btn {
            font-size: 14px;
            color: #dc3545;
            border: 1px solid #dc3545;
            background: transparent;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #dc3545;
            color: #fff;
        }
        .btn-logout {
            font-size: 14px;
            color: #6c757d;
            background-color: transparent;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-logout:hover {
            color: #ffffff;
        }
        .sidebar {
            background: white;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 0;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #dee2e6;
            font-weight: 500;
            font-size: 16px;
        }
        .sidebar .list-group-item {
            border: none;
            border-radius: 0;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #212529;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar .list-group-item:hover {
            background-color: #f8f9fa;
        }
        .sidebar .list-group-item.active {
            background-color: #e7f1ff;
            color: #0d6efd;
            border-left: 3px solid #0d6efd;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark border-bottom">
    <div class="container">
        <span class="navbar-brand" th:text="${user.email}">user@mail.ru</span>
        <span class="navbar-text">
            with roles:
            <span th:each="role : ${user.roles}" class="badge badge-role me-1" th:text="${role.name}">USER</span>
            </span>
        <div class="ms-auto d-flex align-items-center gap-2">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">


    <div class="row">
        <!-- Левая боковая панель -->
        <div class="col-md-3 mb-4">
            <div class="sidebar">
                <div class="list-group list-group-flush">
                    <a href="/admin/users" class="list-group-item list-group-item-action">
                        Admin
                    </a>
                    <a href="/user" class="list-group-item list-group-item-action" th:classappend="'active'">
                        User
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            <h1>User information-page</h1>
    <div class="card">
        <div class="card-header">
            About user
        </div>
        <div class="card-body p-0" th:if="${user}">
            <table class="table info-table">
                <thead>
                <tr>
                    <th>ID</th>

                    <th>First Name</th>

                    <th>Last Name</th>

                    <th>Age</th>

                    <th>Email</th>

                    <th>Role</th>

                </tr>
                </thead>
                <tbody>
                <td th:text="${user.id}"></td>
                <td th:text="${user.firstName}"></td>
                <td th:text="${user.lastName}"></td>
                <td th:text="${user.age}"></td>
                <td th:text="${user.email}"></td>
                <td>
                    <span th:each="role : ${user.roles}" class="badge badge-role" th:text="${role.name}" style="color:black;"></span>
                </td>
                </tbody>
            </table>
        </div>
    </div>
</div>
</div>
</div>

<script src="/js/user.js"></script>
</body>
</html>
